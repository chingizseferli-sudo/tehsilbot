name: Discovery Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Repo klonla
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kitabxanaları quraşdır
        run: |
          pip install -r requirements.txt

      - name: Discovery işə sal
        run: |
          python discovery_bot.py --mode fast

      - name: Dəyişiklikləri commit et
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add discovered_sites.json review_sites.json rejected_sites.json patterns.json

          git diff --staged --quiet || git commit -m "Discovery update"

          git pull --rebase origin main
          git push origin main
