name: Discovery Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Repo clone
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kitabxanaları quraşdır
        run: |
          pip install requests feedparser beautifulsoup4 lxml

      - name: Discovery və pattern yeniləmə
        run: |
          python discovery_bot.py --mode fast

      - name: Dəyişiklikləri commit et
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add discovered_sites.json patterns.json
          git diff --staged --quiet || git commit -m "Auto update discovered sites and patterns"
          git push
