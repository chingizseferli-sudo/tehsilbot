name: Discovery Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  discovery:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EXCLUDED_DOMAIN_SUFFIXES: gov.az
      DISCOVERY_BLOCK_GOV: "true"
      DISCOVERY_WRITE_JSON: "false"
      DISCOVERY_REQUIRE_ACTIVITY: "true"
      DISCOVERY_MIN_NEWS_PER_HOUR: "2"
      DISCOVERY_ACTIVITY_LOOKBACK_HOURS: "1"

    steps:
      - name: Repo klonla
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kitabxanaları quraşdır
        run: |
          pip install -r requirements.txt

      - name: Discovery işə sal
        run: |
          python discovery_bot.py --mode fast
