name: Cleanup Sites

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Repo klonla
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kitabxanaları quraşdır
        run: |
          pip install requests beautifulsoup4

      - name: Sayt siyahılarını təmizlə
        run: |
          python -u cleanup_sites.py

      - name: Dəyişiklikləri commit et
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add courier_config_clean.json discovered_sites.json cleanup_sites.py
          git add *.backup || true

          git diff --staged --quiet || git commit -m "Clean invalid and non-news sites"

          git push
