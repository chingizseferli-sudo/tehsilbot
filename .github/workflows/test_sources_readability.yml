name: Test Sources Readability

on:
  workflow_dispatch:

jobs:
  test-sources-readability:
    runs-on: ubuntu-latest

    steps:
      - name: Repo klonla
        uses: actions/checkout@v4

      - name: Python qur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketləri qur
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser lxml python-dateutil

      - name: Sources readability test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_WORKERS: "10"
          REQUEST_TIMEOUT: "12"
          LIMIT_SOURCES: "0"
          EXCLUDED_DOMAIN_SUFFIXES: gov.az
        run: python test_sources_readability.py

      - name: Hesabatı artifact kimi saxla
        uses: actions/upload-artifact@v4
        with:
          name: source-readability-report
          path: source_readability_report.json
