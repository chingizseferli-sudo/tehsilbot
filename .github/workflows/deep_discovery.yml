name: Deep Discovery

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"

permissions:
  contents: read

jobs:
  deep-discovery:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EXCLUDED_DOMAIN_SUFFIXES: gov.az
      DISCOVERY_BLOCK_GOV: "true"
      DISCOVERY_WRITE_JSON: "false"

    steps:
      - name: Repo klonla
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kitabxanaları quraşdır
        run: |
          pip install -r requirements.txt

      - name: Deep Discovery işə sal
        run: |
          python discovery_bot.py --mode deep --add-to-config
