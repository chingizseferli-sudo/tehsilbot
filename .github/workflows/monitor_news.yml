name: Monitor News

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: monitor-news
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repo klonla
        uses: actions/checkout@v4

      - name: Python qur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python paketlərini yüklə
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Monitor botu işə sal
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_ONCE: "1"
          NOTIFY_START: "0"
          MAX_WORKERS: "10"
          REQUEST_TIMEOUT: "10"
        run: python site_monitor.py
